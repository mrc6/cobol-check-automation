name: COBOL Check Automation
on:
  push:
    branches: [ main ]
jobs:
  cobol-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Java
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Install Zowe CLI
      run: npm install -g @zowe/cli@zowe-v3-lts
    - name: Install GnuCOBOL (cobc)
      run: |
        sudo apt-get update
        sudo apt-get install -y gnucobol libcob4-dev
    - name: Verify installation
      run: cobc --version
    - name: Execute Mainframe Action
      env:
        # Map variables to bypass the interactive prompt or config profiles
        ZOWE_OPT_HOST: ${{ secrets.ZOWE_HOST }}
        ZOWE_OPT_PORT: ${{ secrets.ZOWE_PORT }}
        ZOWE_OPT_USER: ${{ secrets.ZOWE_USERNAME }}
        ZOWE_OPT_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        ZOWE_OPT_REJECT_UNAUTHORIZED: "false" # Set to true if using valid SSL certificates
      run: |
        echo "Checking z/OSMF connection status..."
        zowe zosmf check status
      
        echo "Listing data sets..."
        zowe zos-files list data-set "Z87588.*"
    - name: Setup Mainframe Environment and Upload COBOL Check
      env:
        # Map variables to bypass the interactive prompt or config profiles
        ZOWE_OPT_HOST: ${{ secrets.ZOWE_HOST }}
        ZOWE_OPT_PORT: ${{ secrets.ZOWE_PORT }}
        ZOWE_OPT_USER: ${{ secrets.ZOWE_USERNAME }}
        ZOWE_OPT_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        ZOWE_OPT_REJECT_UNAUTHORIZED: "false" # Set to true if using valid SSL certificates
        ZOWE_CLI_HOME: /tmp/.zowe # Use a temporary directory for Zowe CLI configuration (prevent mkdir() errors)
      run: |
        chmod +x .github/scripts/zowe_operations.sh
        .github/scripts/zowe_operations.sh
    - name: Run COBOL Check on Mainframe
      env:
        # Map variables to bypass the interactive prompt or config profiles
        ZOWE_OPT_HOST: ${{ secrets.ZOWE_HOST }}
        ZOWE_OPT_PORT: ${{ secrets.ZOWE_PORT }}
        ZOWE_OPT_USER: ${{ secrets.ZOWE_USERNAME }}
        ZOWE_OPT_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        ZOWE_OPT_REJECT_UNAUTHORIZED: "false" # Set to true if using valid SSL certificates
        ZOWE_CLI_HOME: /tmp/.zowe # Use a temporary directory for Zowe CLI configuration (prevent mkdir() errors)
      run: |
        chmod +x .github/scripts/mainframe_operations.sh
        .github/scripts/mainframe_operations.sh
